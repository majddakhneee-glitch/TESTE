backend:
  name: git-gateway
  branch: main

# إجبار المحرك على حفظ الحروف العربية بتشفيرها الأصلي دون قلب الرموز
slug:
  encoding: "unicode"
  clean_accents: false

collections:
  - name: site
    label: إعدادات الموقع
    files:
      - name: site
        label: الإعدادات العامة
        file: content/site.json
        format: json
        fields:
          - { label: اسم المتجر, name: brandTitle, widget: string }
          - { label: العنوان الفرعي, name: brandSubtitle, widget: string }

  - name: menu
    label: المنيو المصغر
    files:
      - name: menu
        label: ملف المنيو
        file: content/menu.json
        format: json
        fields:
          - label: الأقسام
            name: categories
            widget: list
            summary: '{{fields.title}}'
            identifier_field: title
            fields:
              - { label: العنوان, name: title, widget: string }
              - { label: الأيقونة, name: icon, widget: string }
              - label: الأصناف
                name: items
                widget: list
                summary: '{{fields.name}}'
                identifier_field: name
                fields:
                  - { label: اسم الصنف, name: name, widget: string }
                  - { label: السعر, name: price, widget: number, value_type: int }
