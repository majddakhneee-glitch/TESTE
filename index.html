<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنيو التجريبي المصغر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #121212; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #FFD700; margin-bottom: 5px; }
        p { color: #aaa; margin-bottom: 25px; }
        .category-title { font-size: 1.3rem; color: #FFD700; margin-top: 20px; border-bottom: 2px dashed #333; padding-bottom: 5px; text-align: right; }
        .item-card { display: flex; justify-content: space-between; background: #2a2a2a; padding: 12px; margin: 10px 0; border-radius: 10px; }
        .item-price { color: #25d366; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="store-title">جاري التحميل...</h1>
        <p id="store-subtitle"></p>

        <div id="menu-container"></div>
    </div>

    <script>
        async function loadData() {
            try {
                // قراءة البيانات مباشرة من مجلد content القياسي والجديد لمنع الكاش القديم
                const [siteRes, menuRes] = await Promise.all([
                    fetch('content/site.json', { cache: 'no-store' }),
                    fetch('content/menu.json', { cache: 'no-store' })
                ]);

                if (siteRes.ok) {
                    const site = await siteRes.json();
                    document.getElementById('store-title').innerText = site.brandTitle;
                    document.getElementById('store-subtitle').innerText = site.brandSubtitle;
                }

                if (menuRes.ok) {
                    const menu = await menuRes.json();
                    const container = document.getElementById('menu-container');
                    container.innerHTML = '';

                    menu.categories.forEach(cat => {
                        container.innerHTML += `<div class="category-title">${cat.title}</div>`;
                        cat.items.forEach(item => {
                            container.innerHTML += `
                                <div class="item-card">
                                    <span>${item.name}</span>
                                    <span class="item-price">${item.price.toLocaleString()} ل.س</span>
                                </div>`;
                        });
                    });
                }
            } catch (e) {
                console.error("خطأ في قراءة ملفات الـ JSON النظيفة:", e);
            }
        }
        loadData();
    </script>
</body>
</html>
